<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass & Ceramics — Günay Najafzade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="nav">
    <a class="nav-name" href="index.html">Günay Najafzade</a>
    <nav class="nav-links" aria-label="Main">
      <a href="index.html#works" data-i18n="nav.portfolio">Portfolio</a>
      <a href="index.html#about" data-i18n="nav.about">About</a>
      <a href="index.html#contact" data-i18n="nav.contact">Contact</a>
      <div class="lang-switch">
        <button class="lang-current" aria-haspopup="true" aria-expanded="false">EN</button>
        <ul class="lang-menu">
          <li><button data-lang="en">English</button></li>
          <li><button data-lang="az">Azərbaycanca</button></li>
          <li><button data-lang="fr">Français</button></li>
          <li><button data-lang="de">Deutsch</button></li>
        </ul>
      </div>
    </nav>
  </header>

  <section class="works category-page">
    <a class="detail-back" href="index.html#works" data-i18n="cat.back">← Back to Portfolio</a>
    <div class="section-head reveal">
      <p class="section-eyebrow" data-i18n="mm.title">Mixed Media</p>
      <h2 class="section-title" data-i18n="cat.glass.title">Glass & Ceramics</h2>
    </div>
    <div class="work-grid">
      <a class="work reveal" href="golden-fish.html">
        <div class="work-frame">
          <img src="images/mixed/golden_fish.jpg" alt="Golden Fish" loading="lazy">
        </div>
        <div class="work-caption">
          <h3 data-i18n="obj.fish.title">Golden Fish</h3>
        </div>
      </a>
      <a class="work reveal" href="microcosme.html">
        <div class="work-frame">
          <img src="images/mixed/horses1.jpg" alt="Microcosme" loading="lazy">
        </div>
        <div class="work-caption">
          <h3 data-i18n="obj.horses.title">Microcosme</h3>
        </div>
      </a>
      <a class="work reveal" href="buddha-blue.html">
        <div class="work-frame">
          <img src="images/mixed/budda1.jpg" alt="Buddha Blue" loading="lazy">
        </div>
        <div class="work-caption">
          <h3 data-i18n="obj.buddha.title">Buddha Blue</h3>
        </div>
      </a>
      <a class="work reveal" href="ezekiels-angel.html">
        <div class="work-frame">
          <img src="images/mixed/angel_1.jpg" alt="Ezekiel's Angel" loading="lazy">
        </div>
        <div class="work-caption">
          <h3 data-i18n="obj.angel.title">Ezekiel's Angel</h3>
        </div>
      </a>
      <a class="work reveal" href="dragon-phoenix-mug.html">
        <div class="work-frame">
          <img src="images/mixed/mug_01.jpg" alt="Dragon and Phoenix" loading="lazy">
        </div>
        <div class="work-caption">
          <h3 data-i18n="obj.mug.title">Dragon and Phoenix</h3>
        </div>
      </a>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Günay Najafzade. <span data-i18n="footer.rights">All rights reserved.</span></p>
  </footer>

  <script src="js/i18n.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function applyLanguage(lang){
      const dict = I18N[lang]; if(!dict) return;
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el=>{
        const key = el.getAttribute('data-i18n'); if(!dict[key]) return;
        if(el.hasAttribute('data-i18n-html')){
          el.innerHTML = dict[key].split('|').map(p=>'<p>'+p+'</p>').join('');
        } else { el.innerHTML = dict[key]; }
      });
      document.querySelector('.lang-current').textContent = lang.toUpperCase();
      document.querySelectorAll('.lang-menu button').forEach(b=>b.classList.toggle('is-active', b.getAttribute('data-lang')===lang));
      try{ localStorage.setItem('lang', lang); }catch(e){}
    }
    const langSwitch=document.querySelector('.lang-switch');
    const langCurrent=document.querySelector('.lang-current');
    langCurrent.addEventListener('click',e=>{e.stopPropagation();const o=langSwitch.classList.toggle('open');langCurrent.setAttribute('aria-expanded',o?'true':'false');});
    document.querySelectorAll('.lang-menu button').forEach(btn=>btn.addEventListener('click',()=>{applyLanguage(btn.getAttribute('data-lang'));langSwitch.classList.remove('open');}));
    document.addEventListener('click',()=>langSwitch.classList.remove('open'));
    let saved='en'; try{ saved=localStorage.getItem('lang')||'en'; }catch(e){}
    applyLanguage(saved);
  </script>
</body>
</html>
